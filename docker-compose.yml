services:
  postgres:
    image: postgres:16
    container_name: wetten-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: wetten-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SRU_BASE_URL: ${SRU_BASE_URL}
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ZONE_ID: ${CF_ZONE_ID}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wetten-cloudflared
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    profiles:
      - tunnel

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: wetten-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Hardcode "postgres" hostname for the worker container — Docker DNS resolves it.
      # Local Bun runs use POSTGRES_HOST=127.0.0.1 from .env instead.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SRU_BASE_URL: ${SRU_BASE_URL}
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ZONE_ID: ${CF_ZONE_ID}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./:/app
      - raw-xml-cache:/var/cache/wetten/raw
    working_dir: /app
    profiles:
      - worker

volumes:
  pgdata:
  raw-xml-cache:
